# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration
#
# Configured to match the existing CHANGELOG.md style (Keep a Changelog).
# Requires GITHUB_TOKEN env var for GitHub usernames, PR links, and new contributors.

[changelog]
header = """
<!-- markdownlint-disable MD024 -->

# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""

body = """
{% if version %}\
    ## Version {{ version }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | split(pat="\n") | first | upper_first }}\
            {% if commit.remote.username %} by @{{ commit.remote.username }}{% endif %}\
            {% if commit.remote.pr_number %} in [PR #{{ commit.remote.pr_number }}](https://github.com/mmzeynalli/sqladmin-ng/pull/{{ commit.remote.pr_number }}){% endif %}\
    {% endfor %}
{% endfor -%}
{% if github.contributors | filter(attribute="is_first_time", value=true) | length > 0 %}
    ### New Contributors
    {% for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
        - @{{ contributor.username }} made their first contribution\
            {% if contributor.pr_number %} in [PR #{{ contributor.pr_number }}](https://github.com/mmzeynalli/sqladmin-ng/pull/{{ contributor.pr_number }}){% endif %}\
    {% endfor %}
{% endif -%}
{% if version %}
    - **Full Changelog**: [{{ previous.version | default(value="0.0.0") }}...{{ version }}](https://github.com/mmzeynalli/sqladmin-ng/compare/{{ previous.version | default(value="0.0.0") }}...{{ version }})
{% endif -%}
"""

trim = true
render_always = true

postprocessors = []

[remote.github]
owner = "mmzeynalli"
repo = "sqladmin-ng"

[git]
conventional_commits = true
filter_unconventional = false
require_conventional = false
split_commits = false

commit_preprocessors = []

protect_breaking_commits = false

# Only include merge commits; everything else is skipped.
commit_parsers = [
    { message = "^Merge", group = "<!-- 0 -->Changes" },
    { message = ".*", skip = true },
]

filter_commits = false
fail_on_unmatched_commit = false

link_parsers = [
    { pattern = "#(\\d+)", href = "https://github.com/mmzeynalli/sqladmin-ng/pull/$1" },
]

use_branch_tags = false
topo_order = false
topo_order_commits = true
sort_commits = "oldest"
recurse_submodules = false
